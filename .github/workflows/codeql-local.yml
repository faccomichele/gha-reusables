name: "CodeQL"

on:
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "30 2 * * 0"

permissions:
  actions: read
  contents: read
  security-events: write
      
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  main:
    name: "Analyze"
    uses: faccomichele/gha-reusables/.github/workflows/codeql.yml@main