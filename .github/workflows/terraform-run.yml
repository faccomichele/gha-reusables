name: Terraform Run (reusable workflow)

on:
  workflow_call:
    inputs:
      environment:
        description: 'The target environment (dev, stg, prod), required when s3-bucket is provided'
        type: string
        required: true
      environment-prefix:
        description: 'Optional prefix for the environment name (e.g., "myorg-"). When set, it is prepended to the environment name and used in the Terraform workspace and Project tag.'
        type: string
        default: ''
      region:
        description: 'AWS region for the S3 bucket'
        type: string
        required: true
      global:
        description: 'When true, Terraform treats the run as global (no region in workspace/varfile/terraform env), while AWS CLI still uses the provided region.'
        type: boolean
        default: false
      validation_environment:
        description: 'Optional validation environment suffix (e.g., val1). When set, it is appended to Terraform workspace and Project tag.'
        type: string
        default: ''
      action:
        description: 'The Terraform action to perform: "plan" (review changes only), "apply" (apply changes), or "destroy" (destroy resources)'
        type: string
        default: 'plan'
      action-arguments:
        description: 'Optional additional arguments to pass to the Terraform action (e.g., "-target=module.example")'
        type: string
        default: ''
      working-directory:
        description: 'The location containing the terraform related files'
        type: string
        default: '.'
      lambda-working-directory:
        description: 'The location containing the lambda related files to be uploaded to S3 for use in Terraform'
        type: string
        default: './lambdas'
      upload-output-artifact:
        description: 'Optional: If true, upload the terraform output artifact from the current workflow run, otherwise it skips it.'
        type: boolean
        required: false
        default: false

permissions:
  id-token: write
  pull-requests: write
  contents: read

env:
  ENV_NAME: ${{ inputs.environment }}
  AWS_REGION: ${{ inputs.region }}
  TERRAFORM_REGION: ${{ inputs.global && 'global' || inputs.region }}
  VALIDATION_ENVIRONMENT: ${{ inputs.validation_environment }}

jobs:
  repo_details:
    name: Get repository details
    runs-on: ${{ vars.RUNNERS_AMD64 || 'ubuntu-latest' }}
    outputs:
      repo-name: ${{ steps.repo_details.outputs.repo-name }}
      repo-url: ${{ steps.repo_details.outputs.repo-url }}
    steps:
    - name: Set branch names
      id: repo_details
      uses: faccomichele/gha-composite-repo-details@v1

  terraform_plan_apply:
    name: ${{ format('Run Terraform "{0}" ({1}{2}) - ({3})', inputs.action ,inputs.environment-prefix != '' && format('{0}{1}', inputs.environment-prefix, inputs.environment) || inputs.environment, inputs.global && '' || format('-{0}', inputs.region), inputs.working-directory) }}
    runs-on: ${{ vars.RUNNERS_AMD64 || 'ubuntu-latest' }}
    environment: ${{ inputs.environment-prefix != '' && format('{0}-{1}', inputs.environment-prefix, inputs.environment) || inputs.environment }}
    if: ${{ inputs.working-directory != '[]' }}
    needs: repo_details
    env:
      REPO_NAME: ${{ needs.repo_details.outputs.repo-name }}
      REPO_URL: ${{ needs.repo_details.outputs.repo-url }}
      GH_APP_CLIENT_ID: ${{ secrets.GH_APP_CLIENT_ID }}
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
    steps:
    - name: Custom AWS Login
      id: aws_login
      uses: faccomichele/gha-composite-custom-aws-login@v1
      with:
        account_id: ${{ secrets.ACCOUNT_ID }}
        role_secret: ${{ secrets.ROLE_SECRET }}

    - name: Get source code locally from this repo
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      # TO DO: Hardcode the script version once stable - Import it to ORG level once ready
    - name: Get the Terraform Report Script
      shell: bash
      run: wget -O tf_out_to_md.py https://raw.githubusercontent.com/faccomichele/utils-n-scripts/refs/heads/main/terraform/tf_out_to_md.py && chmod +x tf_out_to_md.py
      working-directory: ${{ inputs.working-directory }}

    - name: Retrieve central account and role secret from SSM
      id: get_core_params
      shell: bash
      run: |
        echo "Retrieving SSM parameters from region ${AWS_REGION}..."
        CORE_ACCOUNT=$(aws ssm get-parameter --name "/terraform-core/global/central-account/account-id" --with-decryption --query Parameter.Value --output text)
        CORE_ROLE_SECRET=$(aws ssm get-parameter --name "/terraform-core/${ENV_NAME}/terraform/state-file/role-secret" --with-decryption --query Parameter.Value --output text)
        CORE_BUCKET_REGION=$(aws ssm get-parameter --name "/terraform-core/${ENV_NAME}/terraform/state-file/bucket-region" --with-decryption --query Parameter.Value --output text)
        # Mask values in GitHub Actions logs
        echo "::add-mask::$CORE_ACCOUNT"
        echo "::add-mask::$CORE_ROLE_SECRET"
        echo "core_account=$CORE_ACCOUNT" | tee -a $GITHUB_OUTPUT
        echo "core_role_secret=$CORE_ROLE_SECRET" | tee -a $GITHUB_OUTPUT
        echo "core_bucket_region=$CORE_BUCKET_REGION" | tee -a $GITHUB_OUTPUT
        
    - name: Download lambda artifacts from S3 if existing
      shell: bash
      continue-on-error: true
      env:
        WORKINGDIR: ${{ inputs.lambda-working-directory }}
      run: |
        # Normalize variables
        BASE_WORKDIR="${{ inputs.working-directory }}"
        WD="${WORKINGDIR%/}"
        BASE="${BASE_WORKDIR%/}"

        STRIPPED_WORKDIR="$WD"
        # If base is not just '.' and WD starts with BASE, strip the BASE prefix
        if [[ -n "$BASE" && "$BASE" != "." && ("$WD" == "$BASE" || "$WD" == "$BASE"/*) ]]; then
          STRIPPED_WORKDIR="${WD#${BASE}}"
        fi

        # Remove any leading './' or leading '/' left after stripping
        STRIPPED_WORKDIR="${STRIPPED_WORKDIR#./}"
        STRIPPED_WORKDIR="${STRIPPED_WORKDIR#/}"

        mkdir -p "${WORKINGDIR}"
        aws s3 sync "s3://aws-terraform-core-shared-artifacts-${{ inputs.environment }}-${{ steps.get_core_params.outputs.core_account }}/${REPO_NAME}/${ENV_NAME}/${STRIPPED_WORKDIR}/" \
          "${WORKINGDIR}/" --no-progress
        echo "Lambda packages downloaded from s3://aws-terraform-core-shared-artifacts-${{ inputs.environment }}-${{ steps.get_core_params.outputs.core_account }}/${REPO_NAME}/${ENV_NAME}/${STRIPPED_WORKDIR}/"

    - name: Get S3 Backend configuration for storing shared state files
      shell: bash
      env:
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
      run: |
        cat > s3backend.tf << EOF
        terraform {
          backend "s3" {
            bucket        = "aws-terraform-core-state-files-${ENV_NAME}-${{ steps.get_core_params.outputs.core_account }}"
            key           = "${ACCOUNT_ID}/${REPO_NAME}/terraform.tfstate"
            region        = "${{ steps.get_core_params.outputs.core_bucket_region }}"
            assume_role   = {
              role_arn    = "arn:aws:iam::${{ steps.get_core_params.outputs.core_account }}:role/terraform-core-backend-setup-${ENV_NAME}-TfStateRole-${{ steps.get_core_params.outputs.core_role_secret }}"
            }
            encrypt       = true
            use_lockfile  = true
          }
        }
        EOF
      working-directory: ${{ inputs.working-directory }}

    - name: Test assume role access to S3 backend bucket
      if: ${{ env.ACTIONS_STEP_DEBUG == 'true' || env.ACTIONS_RUNNER_DEBUG == 'true' }}
      shell: bash
      run: |
        echo "Assuming role to access S3 backend..."
        CREDS=$(aws sts assume-role --role-arn "arn:aws:iam::${{ steps.get_core_params.outputs.core_account }}:role/terraform-core-backend-setup-TerraformStateRole-${{ steps.get_core_params.outputs.core_role_secret }}" --role-session-name "TestS3AccessSession" --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' --output text)
        read AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN <<< "$CREDS"
        export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
        aws sts get-caller-identity
        BUCKET="s3://terraform-core-aws-state-files-${ENV_NAME}-${{ steps.get_core_params.outputs.core_account }}"
        aws s3 ls "$BUCKET" || exit 1

        # Create, get and delete a small non-empty object to validate S3 operations with assumed role
        OBJ_KEY="${REPO_NAME}/tmp-test-${ENV_NAME}-${RANDOM}.txt"
        printf '%s\n' "temporary test object" > /tmp/tmp-test-object.txt
        aws s3 cp /tmp/tmp-test-object.txt "$BUCKET/$OBJ_KEY" || { echo "upload failed"; exit 1; }
        aws s3 cp "$BUCKET/$OBJ_KEY" /tmp/downloaded-test-object.txt || { echo "download failed"; exit 1; }
        if [ ! -s /tmp/downloaded-test-object.txt ]; then echo "downloaded object is empty"; exit 1; fi
        aws s3 rm "$BUCKET/$OBJ_KEY" || { echo "delete failed"; exit 1; }
        rm -f /tmp/tmp-test-object.txt /tmp/downloaded-test-object.txt

        # Unset temporary credentials so they do not persist to later steps
        unset AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN || true
      
    - name: Configure Terraform
      uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # 4.0.0
      with:
        terraform_version:  ${{ vars.TF_VERSION || '1.14.9' }}
        terraform_wrapper: false

    - name: Init Terraform
      shell: bash
      run: terraform init --upgrade --reconfigure
      working-directory: ${{ inputs.working-directory }}

    - name: Set Terraform Workspace Name
      shell: bash
      run: |
        VALIDATION_ENV_RAW="${VALIDATION_ENVIRONMENT:-}"
        VALIDATION_ENV_TRIMMED="$(sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//' <<< "$VALIDATION_ENV_RAW")"
        VALIDATION_ENV_SANITIZED="$(echo "$VALIDATION_ENV_TRIMMED" | tr '[:upper:]' '[:lower:]')"
        VALIDATION_ENV_SANITIZED="$(echo "$VALIDATION_ENV_SANITIZED" | sed -E 's/[^a-z0-9_-]+/-/g')"
        VALIDATION_ENV_SANITIZED="$(echo "$VALIDATION_ENV_SANITIZED" | sed -E 's/[-_]+$//; s/^[-_]+//')"
        VALIDATION_ENV_SANITIZED="$(echo "$VALIDATION_ENV_SANITIZED" | sed -E 's/-+/-/g')"
        VALIDATION_SUFFIX=""
        if [[ -n "$VALIDATION_ENV_SANITIZED" ]]; then
          VALIDATION_SUFFIX="_${VALIDATION_ENV_SANITIZED}"
        fi
        echo "validation-suffix=$VALIDATION_SUFFIX" | tee -a $GITHUB_OUTPUT
        if [[ "${TERRAFORM_REGION}" == "global" ]]; then
          echo "name=${ENV_NAME}${VALIDATION_SUFFIX}" | tee -a $GITHUB_OUTPUT
          echo "varfile=${ENV_NAME^^}_TF_VARS" | tee -a $GITHUB_OUTPUT
        else
          echo "name=${ENV_NAME}_${TERRAFORM_REGION}${VALIDATION_SUFFIX}" | tee -a $GITHUB_OUTPUT
          REGION_UNDERSCORE=${TERRAFORM_REGION//-/_}
          echo "varfile=${ENV_NAME^^}_${REGION_UNDERSCORE^^}_TF_VARS" | tee -a $GITHUB_OUTPUT
        fi
      id: workspace

    - name: Set Terraform Workspace
      shell: bash
      run: terraform workspace select -or-create ${{ steps.workspace.outputs.name }}
      working-directory: ${{ inputs.working-directory }}

    - name: Set Tags Variable
      shell: bash
      run: |
        PROJECT_NAME="${REPO_NAME}${{ steps.workspace.outputs.validation-suffix }}"
        REGION_TAG_VALUE="${TERRAFORM_REGION}"
        TAGS=$(echo """{
          \"Project\": \"${PROJECT_NAME}\",
          \"RepositoryURL\": \"${REPO_URL}\",
          \"Environment\": \"${ENV_NAME}\",
          \"Automation\": \"Terraform\",
          \"Organization\": \"${{ github.repository_owner }}\",
          \"ManagedBy\": \"Terraform\",
          \"Region\": \"${REGION_TAG_VALUE}\",
          \"RepositoryPath\": \"${{ inputs.working-directory }}\",
          \"RepositoryFile\": \"main.tf\"
        }""" | jq -c)
        if [[ "${{ vars.EKS_CLUSTER }}" != "" ]]; then
          TAGS=$(echo $TAGS "{\"EKSCluster\": \"${{ vars.EKS_CLUSTER }}\"}" | jq -sc '.[0] * .[1]')
        fi
        if [[ "${{ vars.ECS_CLUSTER }}" != "" ]]; then
          TAGS=$(echo $TAGS "{\"ECSCluster\": \"${{ vars.ECS_CLUSTER }}\"}" | jq -sc '.[0] * .[1]')
        fi
        echo "value=tags=$TAGS" | tee -a $GITHUB_OUTPUT
      id: tags_var

    - name: Set Terraform Options
      id: options
      shell: bash
      run: |
        case "${{ inputs.action }}" in
          plan)
            echo "action=plan -out=tfplan" | tee -a $GITHUB_OUTPUT
            ;;
          apply)
            echo "action=apply -auto-approve" | tee -a $GITHUB_OUTPUT
            ;;
          destroy)
            echo "action=destroy -auto-approve" | tee -a $GITHUB_OUTPUT
            ;;
          state)
            echo "action=state rm" | tee -a $GITHUB_OUTPUT
            ;;
          *)
            echo "Error: Invalid action '${{ inputs.action }}'. Must be 'plan', 'apply', 'destroy', or 'state'."
            exit 1
            ;;
        esac
        CONFIGFILE=''
        if [[ -f config/${{ steps.workspace.outputs.name }}.tfvars ]]; then
          CONFIGFILE='-var-file=config/${{ steps.workspace.outputs.name }}.tfvars'
        fi
        if [[ -n "${{ inputs.environment-prefix }}" && -f config/${{ inputs.environment-prefix }}/${{ steps.workspace.outputs.name }}.tfvars ]]; then
          CONFIGFILE='-var-file=config/${{ inputs.environment-prefix }}/${{ steps.workspace.outputs.name }}.tfvars'
        fi
        echo "config-file=$CONFIGFILE" | tee -a $GITHUB_OUTPUT
      working-directory: ${{ inputs.working-directory }}

    - name: Generate temporary GitHub token
      id: github_token
      if: ${{ env.GH_APP_CLIENT_ID != '' && env.GH_APP_PRIVATE_KEY != '' }}
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 #v3.2.0
      with:
        client-id: ${{ env.GH_APP_CLIENT_ID }}
        private-key: ${{ env.GH_APP_PRIVATE_KEY }}
        owner: ${{ github.repository_owner }}

    - name: Run Terraform ${{ steps.options.outputs.action }}
      id: tf_run
      if: ${{ inputs.action != 'state' }}
      shell: bash
      env:
        AWS_REGION: ${{ inputs.global && '' || inputs.region }}
        ACTION: ${{ steps.options.outputs.action }}
        CONFIG_FILE: ${{ steps.options.outputs.config-file }}
        TAGS_VAR: ${{ steps.tags_var.outputs.value }}
        TF_VAR_digitalocean_token: ${{ secrets.TF_VAR_DIGITALOCEAN_TOKEN }}
        TF_VAR_github_token: ${{ steps.github_token.outputs.token || '' }}
      run: terraform $ACTION ${{ inputs.action-arguments }} -json -no-color ${CONFIG_FILE:+$CONFIG_FILE} -var="$TAGS_VAR" 2>&1 | tee tf-logs.json
      working-directory: ${{ inputs.working-directory }}

    - name: Run Terraform ${{ steps.options.outputs.action }}
      if: ${{ inputs.action == 'state' }}
      shell: bash
      env:
        AWS_REGION: ${{ inputs.global && '' || inputs.region }}
        ACTION: ${{ steps.options.outputs.action }}
      run: |
        set +e
        TF_RUN_OUTPUT=$(terraform $ACTION ${{ inputs.action-arguments }} 2>&1)
        TF_RUN_EXIT_CODE=$?
        echo "$TF_RUN_OUTPUT"
        {
          echo "terraform_output<<EOF"
          echo "$TF_RUN_OUTPUT"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
        exit $TF_RUN_EXIT_CODE
      working-directory: ${{ inputs.working-directory }}

    - name: Create Show output from Plan action
      if: ${{ inputs.action == 'plan' }}
      shell: bash
      run: terraform show -json tfplan > tf-show.json
      working-directory: ${{ inputs.working-directory }}

    - name: Run Terraform Output to MD Report
      id: tf_report
      if: ${{ always() && (inputs.action == 'plan' || inputs.action == 'apply') }}
      shell: bash
      run: ./tf_out_to_md.py
      working-directory: ${{ inputs.working-directory }}

    - name: Create JSON Output
      if: ${{ inputs.action == 'plan' || inputs.action == 'apply' }}
      shell: bash
      run: terraform output -json > tf-output.json
      working-directory: ${{ inputs.working-directory }}

    - name: Convert working-directory Name
      id: wd_name
      if: ${{ always() && (inputs.action == 'plan' || inputs.action == 'apply') }}
      shell: bash
      run: echo "name=$(echo '${{ inputs.working-directory }}' | tr '/.' '_' )" | tee -a $GITHUB_OUTPUT

    - name: Upload Terraform JSON outputs artifact
      if: ${{ inputs.upload-output-artifact && (inputs.action == 'plan' || inputs.action == 'apply') }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1 
      with:
        name: terraform-output-${{ inputs.environment }}-${{ inputs.region }}-${{ steps.wd_name.outputs.name }}-${{ github.run_id }}
        path: ${{ inputs.working-directory }}/tf-output.json
        retention-days: 1
    
    - name: Add report to job summary
      if: ${{ always() && (inputs.action == 'plan' || inputs.action == 'apply') && steps.tf_report.outcome == 'success' }}
      shell: bash
      run: cat tf-report.md >> $GITHUB_STEP_SUMMARY
      working-directory: ${{ inputs.working-directory }}
    
    - name: Prepare Terraform output for comment
      if: ${{ always() && (inputs.action == 'plan' || inputs.action == 'apply') && steps.tf_report.outcome == 'success' && github.event_name == 'pull_request' }}
      id: tf_comment_prep
      shell: bash
      run: |
        ACTION="${{ inputs.action }}"
        ACTION_TITLE="$(echo ${ACTION:0:1} | tr '[:lower:]' '[:upper:]')${ACTION:1}"
        COMMENT_BODY=""
        MD_FILE="tf-report.md"
        if [[ -f "$MD_FILE" ]]; then
          # Check for errors
          ERRORS=$(grep -E '^### ❌ Error in' "$MD_FILE" || true)
          if [[ -n "$ERRORS" ]]; then
            COMMENT_BODY+="### 🚨 Terraform Errors Detected"$'\n\n'
            COMMENT_BODY+=$(echo "$ERRORS" | sed 's/### ❌ Error in/❌/g')
            COMMENT_BODY+=$'\n\n'
          fi

          # Get summary
          SUMMARY=$(awk '/## Summary/{flag=1;next}/## Detailed Changes/{flag=0}flag' "$MD_FILE")
          if [[ -n "$SUMMARY" ]]; then
            COMMENT_BODY+="### ${ACTION_TITLE} Summary"$'\n'
            COMMENT_BODY+="$SUMMARY"
          fi
        else
          COMMENT_BODY="Could not find the Terraform report file."
        fi

        # Add link to job summary
        JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        COMMENT_BODY+=$'\n\n'
        COMMENT_BODY+="[View Full Report in Job Summary](${JOB_URL})"

        echo "comment_body<<EOF" >> "$GITHUB_OUTPUT"
        printf '%s\n' "$COMMENT_BODY" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"
      working-directory: ${{ inputs.working-directory }}
      
    - name: Comment Terraform Output on PR
      if:  ${{ always() && (inputs.action == 'plan' || inputs.action == 'apply') && steps.tf_comment_prep.outcome == 'success' && github.event_name == 'pull_request' }}
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        COMMENT_BODY: ${{ steps.tf_comment_prep.outputs.comment_body }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const issue_number = context.issue.number;
          if (!issue_number) {
            console.log('Could not determine PR number.');
            return;
          }

          const comment_title = `### Terraform ${{ inputs.action }} for \`${{ inputs.working-directory }}\` in \`${{ inputs.environment }}_${{ inputs.region }}\``;
          const comment_body = `${comment_title}

          ${process.env.COMMENT_BODY}`

          const since_date = new Date();
          since_date.setDate(since_date.getDate() - 3);

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issue_number,
            since: since_date.toISOString(),
            sort: 'updated',
            direction: 'desc'
          });

          const bot_comment = comments.find(comment => {
            return comment.user.login === 'github-actions[bot]' && comment.body.startsWith(comment_title)
          });

          if (bot_comment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: bot_comment.id,
              body: comment_body
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: comment_body
            });
          }
